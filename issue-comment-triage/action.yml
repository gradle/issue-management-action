name: 'Issue Management Action - Issue Comment Triage'
description: 'Add to-triage label when a closed issue is commented on'
author: 'Gradle'

inputs:
  token:
    required: true
    description: 'The GitHub authentication token'
    default: ${{ github.token }}

runs:
  using: node24
  main: ../dist/issue-comment-triage/index.js
